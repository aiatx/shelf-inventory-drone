mission:
  # 是否使用起飞点作为相对坐标原点
  use_relative: true

  # 起飞高度，题目要求 150 ± 10 cm
  takeoff_height: 1.50

  # 相机起飞前离地高度，单位 m
  # 当前实测偏置按 10cm 处理：YAML 中 z 表示“相机中心目标离地高度”。
  camera_initial_height: 0.10

  # 到达航点的误差阈值
  arrive_pos_eps: 0.15
  arrive_z_eps: 0.10
  arrive_yaw_eps_deg: 10.0

  # 扫描点使用更严格的到达阈值，避免 B5/B2 这类直线中间点刚进 15cm 圈就带速度进入扫码。
  # safe 点仍使用上面的普通阈值，减少绕行航点卡顿。
  scan_arrive_pos_eps: 0.06
  scan_arrive_z_eps: 0.06
  scan_arrive_yaw_eps_deg: 6.0

  # P 控制参数
  kp_xy: 0.45
  kp_z: 0.55
  kp_yaw: 0.60

  # 速度限幅
  # max_* 仍用于 scan 扫码点附近，保持原来的靠近二维码稳定性。
  max_vel_xy: 0.25
  max_vel_z: 0.18
  max_yaw_rate: 0.40

  # 普通路段专用速度：只用于 safe 过渡点和 RETURN_LAND 返回降落点上方。
  # scan 扫码点最后接近段不会使用这些参数。
  route_max_vel_xy: 0.32
  route_max_vel_z: 0.22
  route_max_yaw_rate: 0.50
  route_max_acc_xy: 0.24
  route_max_acc_z: 0.16
  route_max_acc_yaw: 0.45

  # 起飞专用竖直速度，只比原来略快，避免起飞太慢但不影响后续扫码高度稳定性
  takeoff_max_vel_z: 0.25
  takeoff_max_acc_z: 0.18

  # 激光点在图像中的像素坐标；848x480 图像中心约为 424,240
  laser_u: 424
  laser_v: 240

  # 二维码中心与激光点的允许像素误差；为缩短对齐耗时，适当放宽到 40px
  align_pixel_eps: 35

  # 视觉对准参数
  align_kp_u: 0.0008
  align_kp_v: 0.0008
  max_align_vel_y: 0.10
  max_align_vel_z: 0.08

  # 超时与激光点亮时间；为压缩总用时，搜索/对齐/点亮时间适当缩短
  search_timeout: 1.4
  align_timeout: 2.0
  laser_flash_time: 0.3
  ack_timeout: 0.1

  # HOVER_BEFORE_SCAN：扫码前最短悬停 0.3s，最长等待 1.0s
  scan_pre_hover_time: 0.3
  scan_pre_hover_timeout: 1.0


  # 受控降落参数：先回到 land 点上方，再用递减 z 航点下降，近地后才交给 AUTO.LAND 停桨。
  # 原默认 0.06m/s 会非常慢；这里改为约 0.18m/s，并把下降级距放大到 0.25m。
  controlled_land_step: 0.25
  controlled_land_final_height: 0.05
  controlled_land_contact_height: 0.12
  controlled_land_max_vel_z: 0.18
  controlled_land_max_acc_z: 0.20
  controlled_land_pos_eps: 0.10
  controlled_land_z_eps: 0.06
  controlled_land_yaw_eps_deg: 8.0
  land_finish_timeout: 25.0

  # 降落点：题图右上角黑色圆形区域中心。
  # D 面最后一个盘点点为 z=1.40，因此这里也保持 z=1.40，扫完 D 面后先平移到降落点正上方，再执行受控递减高度降落。
  land:
    x: 3.50
    y: 2.50
    z: 1.40
    yaw: 3.1416

  # type=safe 表示安全过渡点；type=scan 表示盘点点
  # yaw=0.0 面向赛场 +X；yaw=3.1416 面向赛场 -X
  # 两个货架中心线约为 x=0.75 / x=2.75。
  # 本版将扫码时机体中心到货架中心线的距离改为 0.50m：
  # A=0.25, B=1.25, C=2.25, D=3.25。
  # 进入每个面的最后一个 safe 点与该面的第一个 scan 点保持相同 x/z/yaw，
  # 因此 safe -> scan 只发生 y 方向移动。
  points:
    # 起飞后进入左货架下方安全通道；第二个 safe 与 A1 只差 y 坐标
    - {type: safe, x: 0.00, y: 0.25, z: 1.50, yaw: 0.0}
    - {type: safe, x: 0.25, y: 0.25, z: 1.40, yaw: 0.0}

    # A 面：左货架左侧，距离左货架中心线 x=0.75 约 0.50m
    - {type: scan, face: A, slot: 3, x: 0.25, y: 0.75, z: 1.40, yaw: 0.0}
    - {type: scan, face: A, slot: 2, x: 0.25, y: 1.25, z: 1.40, yaw: 0.0}
    - {type: scan, face: A, slot: 1, x: 0.25, y: 1.75, z: 1.40, yaw: 0.0}
    - {type: scan, face: A, slot: 4, x: 0.25, y: 1.75, z: 1.00, yaw: 0.0}
    - {type: scan, face: A, slot: 5, x: 0.25, y: 1.25, z: 1.00, yaw: 0.0}
    - {type: scan, face: A, slot: 6, x: 0.25, y: 0.75, z: 1.00, yaw: 0.0}

    # A 面 -> B 面：从左货架下端红杆外侧绕行；最后一个 safe 与 B4 只差 y 坐标
    - {type: safe, x: 0.25, y: -0.10, z: 1.00, yaw: 0.0}
    - {type: safe, x: 1.25, y: -0.10, z: 1.00, yaw: 0.0}
    - {type: safe, x: 1.25, y: -0.10, z: 1.00, yaw: 3.1416}

    # B 面：左货架右侧，距离左货架中心线 x=0.75 约 0.50m
    - {type: scan, face: B, slot: 4, x: 1.25, y: 0.75, z: 1.00, yaw: 3.1416}
    - {type: scan, face: B, slot: 5, x: 1.25, y: 1.25, z: 1.00, yaw: 3.1416}
    - {type: scan, face: B, slot: 6, x: 1.25, y: 1.75, z: 1.00, yaw: 3.1416}
    - {type: scan, face: B, slot: 3, x: 1.25, y: 1.75, z: 1.40, yaw: 3.1416}
    - {type: scan, face: B, slot: 2, x: 1.25, y: 1.25, z: 1.40, yaw: 3.1416}
    - {type: scan, face: B, slot: 1, x: 1.25, y: 0.75, z: 1.40, yaw: 3.1416}

    # B 面 -> C 面：从两货架之间下方通道转到 C 面。
    # 旋转点放在 B/C 两面中间 x=1.75，避免在靠近 B 面或 C 面的位置旋转时机身失控贴货架。
    # 最后一个 safe 与 C1 只差 y 坐标。
    - {type: safe, x: 1.25, y: -0.10, z: 1.40, yaw: 3.1416}
    - {type: safe, x: 1.75, y: -0.10, z: 1.40, yaw: 3.1416}
    - {type: safe, x: 1.75, y: -0.10, z: 1.40, yaw: 0.0}
    - {type: safe, x: 2.25, y: -0.10, z: 1.40, yaw: 0.0}

    # C 面：右货架左侧，距离右货架中心线 x=2.75 约 0.50m
    - {type: scan, face: C, slot: 3, x: 2.25, y: 0.75, z: 1.40, yaw: 0.0}
    - {type: scan, face: C, slot: 2, x: 2.25, y: 1.25, z: 1.40, yaw: 0.0}
    - {type: scan, face: C, slot: 1, x: 2.25, y: 1.75, z: 1.40, yaw: 0.0}
    - {type: scan, face: C, slot: 4, x: 2.25, y: 1.75, z: 1.00, yaw: 0.0}
    - {type: scan, face: C, slot: 5, x: 2.25, y: 1.25, z: 1.00, yaw: 0.0}
    - {type: scan, face: C, slot: 6, x: 2.25, y: 0.75, z: 1.00, yaw: 0.0}

    # C 面 -> D 面：从右货架下端红杆外侧绕行；最后一个 safe 与 D4 只差 y 坐标
    - {type: safe, x: 2.25, y: -0.10, z: 1.00, yaw: 0.0}
    - {type: safe, x: 3.25, y: -0.10, z: 1.00, yaw: 0.0}
    - {type: safe, x: 3.25, y: -0.10, z: 1.00, yaw: 3.1416}

    # D 面：右货架右侧，距离右货架中心线 x=2.75 约 0.50m
    - {type: scan, face: D, slot: 4, x: 3.25, y: 0.75, z: 1.00, yaw: 3.1416}
    - {type: scan, face: D, slot: 5, x: 3.25, y: 1.25, z: 1.00, yaw: 3.1416}
    - {type: scan, face: D, slot: 6, x: 3.25, y: 1.75, z: 1.00, yaw: 3.1416}
    - {type: scan, face: D, slot: 3, x: 3.25, y: 1.75, z: 1.40, yaw: 3.1416}
    - {type: scan, face: D, slot: 2, x: 3.25, y: 1.25, z: 1.40, yaw: 3.1416}
    - {type: scan, face: D, slot: 1, x: 3.25, y: 0.75, z: 1.40, yaw: 3.1416}
